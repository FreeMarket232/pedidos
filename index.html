<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colmado El Baratón - Pedidos</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #2ecc71; --secondary: #2c3e50; --accent: #e74c3c; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 120px; }
        header { background: var(--secondary); color: white; text-align: center; padding: 25px 15px; border-bottom: 5px solid var(--primary); }
        header h1 { margin: 0; font-size: 1.8rem; text-transform: uppercase; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        /* Tarjeta de Producto con Imagen */
        .producto { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 15px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: 0.3s; }
        .img-prod { width: 80px; height: 80px; object-fit: cover; padding: 10px; }
        .info { flex: 1; padding: 10px; }
        .info h3 { margin: 0; font-size: 1rem; color: #333; }
        .info p { margin: 5px 0; color: var(--primary); font-weight: 700; font-size: 1.1rem; }
        
        .controles { display: flex; align-items: center; gap: 12px; padding-right: 15px; }
        button.qty { background: #eee; color: #333; border: none; border-radius: 50%; width: 35px; height: 35px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        button.qty:active { background: var(--primary); color: white; }
        .cantidad { font-weight: bold; min-width: 20px; text-align: center; }

        /* Formulario */
        .seccion-pedido { background: white; border-radius: 15px; padding: 20px; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .seccion-pedido h3 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; color: var(--secondary); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; }
        
        /* Footer Fijo */
        .footer-total { position: fixed; bottom: 0; width: 100%; background: white; padding: 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; border-radius: 20px 20px 0 0; }
        .btn-enviar { background: #25d366; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<header>
    <h1><i class="fas fa-store"></i> El Baratón</h1>
    <p style="margin:5px 0 0">¡Pide ahora y recibe en minutos! 🛵</p>
</header>

<div class="container">
    <!-- PRODUCTOS TOP 5 RD -->
    <div class="producto" data-nombre="Arroz Selecto (Lb)" data-precio="35">
        <img src="https://unsplash.com" class="img-prod">
        <div class="info"><h3>Arroz Selecto (Lb)</h3><p>RD$35</p></div>
        <div class="controles">
            <button class="qty" onclick="cambiarCant(this, -1)">-</button>
            <span class="cantidad">0</span>
            <button class="qty" onclick="cambiarCant(this, 1)">+</button>
        </div>
    </div>

    <div class="producto" data-nombre="Aceite 16oz" data-precio="95">
        <img src="https://unsplash.com" class="img-prod">
        <div class="info"><h3>Aceite 16oz</h3><p>RD$95</p></div>
        <div class="controles">
            <button class="qty" onclick="cambiarCant(this, -1)">-</button>
            <span class="cantidad">0</span>
            <button class="qty" onclick="cambiarCant(this, 1)">+</button>
        </div>
    </div>

    <div class="producto" data-nombre="Cerveza Presidenta" data-precio="250">
        <img src="https://unsplash.com" class="img-prod">
        <div class="info"><h3>Presidenta (G)</h3><p>RD$250</p></div>
        <div class="controles">
            <button class="qty" onclick="cambiarCant(this, -1)">-</button>
            <span class="cantidad">0</span>
            <button class="qty" onclick="cambiarCant(this, 1)">+</button>
        </div>
    </div>

    <div class="producto" data-nombre="Salami Super (Lb)" data-precio="145">
        <img src="https://unsplash.com" class="img-prod">
        <div class="info"><h3>Salami Super (Lb)</h3><p>RD$145</p></div>
        <div class="controles">
            <button class="qty" onclick="cambiarCant(this, -1)">-</button>
            <span class="cantidad">0</span>
            <button class="qty" onclick="cambiarCant(this, 1)">+</button>
        </div>
    </div>

    <!-- DATOS DE ENVÍO -->
    <div class="seccion-pedido">
        <h3><i class="fas fa-clipboard-list"></i> Finalizar Pedido</h3>
        <input type="text" id="nombreCliente" placeholder="¿Su nombre?">
        <select id="tipoEntrega" onchange="toggleDireccion()">
            <option value="delivery">Envío a domicilio (Delivery) 🛵</option>
            <option value="recogida">Yo paso a buscarlo 🏃‍♂️</option>
        </select>
        <textarea id="direccion" placeholder="Dirección exacta..."></textarea>
        <!-- CAMPO NUEVO: NOTAS ADICIONALES -->
        <textarea id="notasExtra" placeholder="¿Algo más que necesite? (Ej: Una recarga de 100, un botellón...)"></textarea>
    </div>
</div>

<div class="footer-total">
    <div style="margin-bottom: 10px; font-size: 1.2rem;">Total a pagar: <strong>RD$<span id="totalGral">0</span></strong></div>
    <button class="btn-enviar" onclick="enviarWhatsApp()">
        <i class="fab fa-whatsapp"></i> HACER PEDIDO
    </button>
</div>

<script>
    let total = 0;
    function cambiarCant(btn, cambio) {
        let span = btn.parentElement.querySelector('.cantidad');
        let cant = parseInt(span.innerText) + cambio;
        if (cant < 0) cant = 0;
        span.innerText = cant;
        calcularTotal();
    }
    function calcularTotal() {
        total = 0;
        document.querySelectorAll('.producto').forEach(p => {
            let cant = parseInt(p.querySelector('.cantidad').innerText);
            let precio = parseInt(p.getAttribute('data-precio'));
            total += (cant * precio);
        });
        document.getElementById('totalGral').innerText = total;
    }
    function toggleDireccion() {
        let tipo = document.getElementById('tipoEntrega').value;
        document.getElementById('direccion').style.display = (tipo === 'delivery') ? 'block' : 'none';
    }
    function enviarWhatsApp() {
        let nombre = document.getElementById('nombreCliente').value;
        let tipo = document.getElementById('tipoEntrega').value;
        let dir = document.getElementById('direccion').value;
        let notas = document.getElementById('notasExtra').value;
        
        if (!nombre) { alert("Por favor, dinos tu nombre."); return; }
        if (total === 0 && !notas) { alert("Agregue algo al carrito o escriba una nota."); return; }

        let mensaje = `*¡NUEVO PEDIDO - EL BARATÓN!* 🛒\n`;
        mensaje += `━━━━━━━━━━━━━━━━━━\n`;
        mensaje += `👤 *Cliente:* ${nombre}\n`;
        mensaje += `🛵 *Tipo:* ${tipo === 'delivery' ? 'Delivery' : 'Recogida'}\n`;
        if(tipo === 'delivery') mensaje += `📍 *Dir:* ${dir}\n`;
        mensaje += `━━━━━━━━━━━━━━━━━━\n`;
        
        if(total > 0) {
            mensaje += `*PRODUCTOS:*\n`;
            document.querySelectorAll('.producto').forEach(p => {
                let cant = parseInt(p.querySelector('.cantidad').innerText);
                if (cant > 0) {
                    mensaje += `✅ ${cant}x ${p.getAttribute('data-nombre')}\n`;
                }
            });
            mensaje += `━━━━━━━━━━━━━━━━━━\n`;
            mensaje += `💰 *TOTAL: RD$${total}*\n`;
        }

        if(notas) {
            mensaje += `\n📝 *NOTAS ADICIONALES:* \n${notas}\n`;
        }
        
        mensaje += `━━━━━━━━━━━━━━━━━━\n`;
        if(tipo === 'recogida') mensaje += `_Estaré allá en 15-20 min._`;

        let url = `https://whatsapp.com{encodeURIComponent(mensaje)}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
