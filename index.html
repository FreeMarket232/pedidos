<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colmado El Baratón - Pedidos</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #27ae60; --secondary: #2c3e50; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 140px; color: #333; }
        header { background: var(--secondary); color: white; text-align: center; padding: 30px 15px; border-bottom: 5px solid var(--primary); }
        
        /* CUADRÍCULA DE PRODUCTOS */
        .grid-productos { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* Dos columnas */
            gap: 15px; 
            padding: 15px; 
            max-width: 600px; 
            margin: auto; 
        }
        
        .producto { 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            padding-bottom: 10px;
            text-align: center;
        }
        
        .img-prod { width: 100%; height: 120px; object-fit: cover; background: #eee; }
        .info { padding: 10px; width: 100%; box-sizing: border-box; }
        .info h3 { margin: 0; font-size: 0.9rem; height: 35px; overflow: hidden; }
        .info p { margin: 5px 0; color: var(--primary); font-weight: bold; font-size: 1.1rem; }
        
        .controles { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 5px; }
        button.qty { background: #f1f1f1; border: none; border-radius: 5px; width: 30px; height: 30px; font-weight: bold; cursor: pointer; }
        button.qty:active { background: var(--primary); color: white; }

        /* FORMULARIO */
        .seccion-pedido { background: white; border-radius: 12px; padding: 20px; margin: 0 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 570px; margin: auto; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        /* FOOTER TOTAL */
        .footer-total { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        .btn-enviar { background: #25d366; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<header>
    <h1>🏢 El Baratón</h1>
    <p>¡Calidad y economía en su mesa!</p>
</header>

<div class="grid-productos">
    <!-- PRODUCTOS -->
    <div class="producto" data-nombre="Arroz Selecto (Lb)" data-precio="35">
        <a href="https://ibb.co/gbPVGGD3"><img src="https://i.ibb.co/ZRYm33hV/8.png" alt="8" border="0"></a>
        <div class="info"><h3>Arroz Selecto (Lb)</h3><p>RD$35</p></div>
        <div class="controles">
            <button class="qty" onclick="cambiarCant(this, -1)">-</button>
            <span class="cantidad">0</span>
            <button class="qty" onclick="cambiarCant(this, 1)">+</button>
        </div>
    </div>

    <div class="producto" data-nombre="Aceite 16oz" data-precio="95">
        <img src="https://postimg.cc" class="img-prod">
        <div class="info"><h3>Aceite 16oz</h3><p>RD$95</p></div>
        <div class="controles">
            <button class="qty" onclick="cambiarCant(this, -1)">-</button>
            <span class="cantidad">0</span>
            <button class="qty" onclick="cambiarCant(this, 1)">+</button>
        </div>
    </div>

    <div class="producto" data-nombre="Cerveza Presidente" data-precio="250">
        <img src="https://postimg.cc" class="img-prod">
        <div class="info"><h3>Presidente (G)</h3><p>RD$250</p></div>
        <div class="controles">
            <button class="qty" onclick="cambiarCant(this, -1)">-</button>
            <span class="cantidad">0</span>
            <button class="qty" onclick="cambiarCant(this, 1)">+</button>
        </div>
    </div>

    <div class="producto" data-nombre="Salami Super (Lb)" data-precio="145">
        <img src="https://postimg.cc" class="img-prod">
        <div class="info"><h3>Salami Super (Lb)</h3><p>RD$145</p></div>
        <div class="controles">
            <button class="qty" onclick="cambiarCant(this, -1)">-</button>
            <span class="cantidad">0</span>
            <button class="qty" onclick="cambiarCant(this, 1)">+</button>
        </div>
    </div>
</div>

<div class="seccion-pedido">
    <h3>📝 Datos del Envío</h3>
    <input type="text" id="nombreCliente" placeholder="¿Cómo se llama usted?">
    <select id="tipoEntrega" onchange="toggleDireccion()">
        <option value="delivery">Envío por Delivery 🛵</option>
        <option value="recogida">Pasaré a buscarlo 🏃‍♂️</option>
    </select>
    <textarea id="direccion" placeholder="Dirección exacta..."></textarea>
    <textarea id="notasExtra" placeholder="¿Algo más? (Ej: Una recarga, botellón...)"></textarea>
</div>

<div class="footer-total">
    <div style="margin-bottom: 10px;">Total: <strong>RD$<span id="totalGral">0</span></strong></div>
    <!-- Cambiamos el botón por un enlace directo 'id=btnWhatsapp' -->
    <a id="linkWhatsapp" href="#" class="btn-enviar" style="text-decoration: none;">
        <i class="fab fa-whatsapp"></i> ENVIAR PEDIDO
    </a>
</div>
>

<script>
    let total = 0;
    function cambiarCant(btn, cambio) {
        let span = btn.parentElement.querySelector('.cantidad');
        let cant = parseInt(span.innerText) + cambio;
        if (cant < 0) cant = 0;
        span.innerText = cant;
        calcularTotal();
    }
    function calcularTotal() {
        total = 0;
        document.querySelectorAll('.producto').forEach(p => {
            let cant = parseInt(p.querySelector('.cantidad').innerText);
            total += (cant * parseInt(p.getAttribute('data-precio')));
        });
        document.getElementById('totalGral').innerText = total;
    }
    function toggleDireccion() {
        let tipo = document.getElementById('tipoEntrega').value;
        document.getElementById('direccion').style.display = (tipo === 'delivery') ? 'block' : 'none';
    }
    function enviarWhatsApp() {
        let nombre = document.getElementById('nombreCliente').value;
        let tipo = document.getElementById('tipoEntrega').value;
        let dir = document.getElementById('direccion').value;
        let notas = document.getElementById('notasExtra').value;
        
        if (!nombre) { alert("Por favor, ponga su nombre."); return; }
        if (total === 0 && !notas) { alert("El carrito está vacío."); return; }

        let mensaje = `*PEDIDO: EL BARATÓN* 🛒\n`;
        mensaje += `👤 *Cliente:* ${nombre}\n`;
        mensaje += `🛵 *Tipo:* ${tipo === 'delivery' ? 'Delivery' : 'Recogida'}\n`;
        if(tipo === 'delivery') mensaje += `📍 *Dir:* ${dir}\n`;
        
        if(total > 0) {
            mensaje += `\n*PRODUCTOS:*\n`;
            document.querySelectorAll('.producto').forEach(p => {
                let cant = parseInt(p.querySelector('.cantidad').innerText);
                if (cant > 0) mensaje += `✅ ${cant}x ${p.getAttribute('data-nombre')}\n`;
            });
            mensaje += `\n💰 *TOTAL: RD$${total}*`;
        function enviarWhatsApp() {
    // ... (todo tu código anterior de captura de datos)

    // REEMPLAZA EL FINAL CON ESTO:
    let miNumero = "18097214456"; // Tu número de prueba
    let url = `https://wa.me{miNumero}?text=${encodeURIComponent(mensaje)}`;
    
    // Esta línea es la clave: no usa pop-ups, redirecciona directo
    window.location.href = url;
}
</script>

</body>
</html>
