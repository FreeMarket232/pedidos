<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Colmado Digital</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; padding-bottom: 30px; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 10px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .img-prod { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; background: #eee; }
        .prod-info { flex-grow: 1; }
        .prod-info h3 { margin: 0; font-size: 15px; }
        .prod-info p { margin: 3px 0; color: var(--primary); font-weight: bold; }
        .btn-add { background: var(--primary); color: white; border: none; width: 35px; height: 35px; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .carrito-box { background: white; border-radius: 15px; padding: 15px; margin-top: 15px; border: 1px solid #ddd; }
        .entrega-opciones { display: flex; gap: 10px; margin: 15px 0; }
        .opcion { flex: 1; text-align: center; padding: 10px; border: 1px solid #ccc; border-radius: 10px; cursor: pointer; font-size: 14px; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + label { background: var(--primary); color: white; border-color: var(--primary); }
        input, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        .btn-ws { background: #25d366; color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0;">🛒 Colmado el Baratón (DEMO)</h2>
    <p style="margin:0; font-size:12px;">Muestra de funcionamiento para el cliente</p>
</header>

<div class="container">
    <!-- Producto 1: Cerveza -->
    <div class="card">
        <img src="https://i.ibb.co/gFfb5m2R/C-446.jpg
" alt="Cerveza" class="img-prod">
        <div class="prod-info">
            <h3>Cerveza Presidente (G)</h3>
            <p>RD$ 220.00</p>
        </div>
        <button class="btn-add" onclick="agregar('Presidente G.', 220)">+</button>
    </div>

    <!-- Producto 2: Aceite -->
    <div class="card">
        <img src="https://i.ibb.co/whVC8S3R/CRISOL-16-OZ-1.png" alt="Aceite" class="img-prod">
        <div class="prod-info">
            <h3>Aceite Cocinero (1/2 Gal)</h3>
            <p>RD$ 210.00</p>
        </div>
        <button class="btn-add" onclick="agregar('Aceite 1/2 Gal', 210)">+</button>
    </div>

    <!-- Producto 3: Arroz -->
    <div class="card">
        <img src="https://i.ibb.co/QvvhSRTB/8.png" alt="Arroz" class="img-prod">
        <div class="prod-info">
            <h3>Arroz Selecto (Lb)</h3>
            <p>RD$ 35.00</p>
        </div>
        <button class="btn-add" onclick="agregar('Arroz Lb.', 35)">+</button>
    </div>

    <!-- Carrito -->
    <div class="carrito-box">
        <h4 style="margin:0;"><i class="fas fa-shopping-basket"></i> Tu Carrito:</h4>
        <div id="lista-pedido" style="font-size: 14px; color: #555; margin: 10px 0;">No hay productos</div>
        
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size: 18px;">
            <span>TOTAL:</span>
            <span>RD$ <span id="total-monto">0</span></span>
        </div>

        <hr>

        <p style="margin: 5px 0; font-weight: bold; font-size: 14px;">¿Cómo lo quieres?</p>
        <div class="entrega-opciones">
            <input type="radio" id="delivery" name="tipo_entrega" value="Delivery" checked>
            <label for="delivery" class="opcion">🛵 Delivery</label>
            
            <input type="radio" id="recogida" name="tipo_entrega" value="Pasar a buscar">
            <label for="recogida" class="opcion">🏃 Pasar a buscar</label>
        </div>

        <input type="text" id="cliente" placeholder="Nombre del cliente">
        <input type="text" id="direccion" placeholder="Dirección (si es Delivery)">
        
        <!-- TEXTO LIBRE AGREGADO AQUÍ -->
        <textarea id="otros-productos" rows="2" placeholder="¿Algo más? (Ej: 2 mentas, un aguacate...)"></textarea>

        <button class="btn-ws" onclick="enviar()">
            <i class="fab fa-whatsapp"></i> PROBAR PEDIDO
        </button>
    </div>
</div>

<script>
    let pedido = [];
    let total = 0;

    function agregar(nombre, precio) {
        pedido.push({nombre, precio});
        total += precio;
        render();
    }

    function borrar(index) {
        total -= pedido[index].precio;
        pedido.splice(index, 1);
        render();
    }

    function render() {
        const lista = document.getElementById('lista-pedido');
        if(pedido.length === 0) {
            lista.innerHTML = 'No hay productos';
        } else {
            lista.innerHTML = pedido.map((p, i) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>- ${p.nombre}</span>
                    <span>RD$ ${p.precio} <i class="fas fa-trash" style="color:red; cursor:pointer; margin-left:8px;" onclick="borrar(${i})"></i></span>
                </div>
            `).join('');
        }
        document.getElementById('total-monto').innerText = total;
    }

    function enviar() {
        const cliente = document.getElementById('cliente').value;
        const direccion = document.getElementById('direccion').value;
        const otros = document.getElementById('otros-productos').value;
        const tipoEntrega = document.querySelector('input[name="tipo_entrega"]:checked').value;
        const telf = "18097214456"; 

        if(!cliente || (pedido.length === 0 && otros === "")) return alert("Agregue productos o escriba qué desea pedir.");

        let texto = `*NUEVO PEDIDO (PRUEBA)*%0A`;
        texto += `--------------------------%0A`;
        texto += `*Cliente:* ${cliente}%0A`;
        texto += `*Tipo:* ${tipoEntrega}%0A`;
        if(tipoEntrega === "Delivery") {
            texto += `*Dirección:* ${direccion}%0A`;
        }
        texto += `--------------------------%0A`;
        
        if(pedido.length > 0) {
            texto += `*Productos:*%0A`;
            pedido.forEach(p => {
                texto += `- ${p.nombre} (RD$ ${p.precio})%0A`;
            });
            texto += `--------------------------%0A`;
            texto += `*TOTAL ESTIMADO: RD$ ${total}*%0A`;
        }

        if(otros !== "") {
            texto += `%0A*OTROS PEDIDOS:*%0A${otros}%0A`;
            texto += `_(Consultar precio con el colmadero)_%0A`;
        }

        const url = "https://wa.me" + telf + "?text=" + texto;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
